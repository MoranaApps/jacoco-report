# NOTE: This workflow expects that branch protection rules require all checks to pass before merging.
# Auto-merge will only occur if all required status checks and reviews are successful.

name: Renovate auto-merge
on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    name: Auto-enable auto-merge for Renovate PRs
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'renovate[bot]' && github.repository == 'MoranaApps/jacoco-report'
    steps:
      - name: Approve Renovate PR (optional PAT)
        if: ${{ secrets.RENOVATE_REVIEW_TOKEN != '' }}
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.RENOVATE_REVIEW_TOKEN }}

      - name: Skip approval (no review token configured)
        if: ${{ secrets.RENOVATE_REVIEW_TOKEN == '' }}
        run: echo "Skipping PR approval. Configure RENOVATE_REVIEW_TOKEN to enable automated approvals."

      - name: Enable auto-merge for Renovate PR
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
