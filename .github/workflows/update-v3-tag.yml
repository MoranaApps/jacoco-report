name: Update v3 tag on release

on:
  release:
    types: [published]

jobs:
  update-v3-tag:
    if: startsWith(github.event.release.tag_name, 'v3.')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set Git user
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Move v3 tag to this release
        run: |
          git fetch --tags
          COMMIT_SHA=$(git rev-list -n 1 ${{ github.event.release.tag_name }})
          echo "Release tag '${{ github.event.release.tag_name }}' resolves to commit $COMMIT_SHA"
          git tag -f v3 $COMMIT_SHA
          git push origin -f v3
