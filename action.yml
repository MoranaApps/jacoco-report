name: 'JaCoCo Report to PR Comment'
description: 'Add JaCoCo report to PR comment.'
inputs:
  token:
    description: 'GitHub token used to read PR data and create/update PR comments.'
    required: true
  paths:
    description: 'Newline-separated paths or glob patterns to JaCoCo XML reports. Defaults to **/jacoco.xml.'
    required: false
    default: '**/jacoco.xml'
  exclude-paths:
    description: 'Newline-separated paths or globs to exclude from scanning.'
    required: false
  global-thresholds:
    description: 'Global thresholds in format overall*changed-files-average.'
    required: false
    default: '0*0'
  report-thresholds-default:
    description: >
      Default thresholds applied at the report/group level when a group omits a threshold field.
      Format: overall*changed-files-average*per-changed-file (e.g. "75*60*0").
      global-thresholds is a separate evaluation pass and is never in this fallback chain.
    required: false
    default: '0*0*0'
  title:
    description: 'Title used for the PR comment body and comment update matching.'
    required: false
  pr-number:
    description: 'PR number.'
    required: false
    default: ''
  metric:
    description: 'Coverage metric used for evaluation: instruction, line, branch, complexity, method, or class.'
    required: false
    default: 'instruction'
  comment-level:
    description: 'Comment output level: none, minimal, full, changed, failed, or failed-or-changed.'
    required: false
    default: 'full'
  report-groups:
    description: >
      Define named report groups. When provided, paths can be omitted and groups define their own paths.
      YAML list; each entry: name (required), paths (required list of globs),
      thresholds (optional O*A*P string), baseline-paths (optional list).
    required: false
    default: ''
  skip-unchanged:
    description: 'If true, reports with no changed files are removed from comment rows.'
    required: false
    default: 'false'
  evaluate-unchanged:
    description: >
      Applies only when skip-unchanged is true.
      If true, filtered unchanged reports are still checked for overall threshold failures (result only, no comment rows).
      If false, filtered unchanged reports are excluded from both comment rows and threshold evaluation.
    required: false
    default: 'true'
  global-overall-scope:
    description: >
      Controls which reports contribute to the global overall coverage number when report-groups is configured.
      'all' (default): scans the top-level paths and includes every discovered report in the global overall,
      even if it is not assigned to any group. Reports outside all groups are included in the global number
      but do not appear in any group row.
      'groups-only': only reports matched by a group path pattern count toward global overall (pre-v4 behaviour).
    required: false
    default: 'all'
  baseline-paths:
    description: 'Paths to JaCoCo baseline reports.'
    required: false
  update-comment:
    description: 'If true, update an existing action comment with the same title instead of creating a new one.'
    required: false
    default: 'true'
  pass-symbol:
    description: 'Symbol to represent pass status.'
    required: false
    default: '✅'
  fail-symbol:
    description: 'Symbol to represent fail status.'
    required: false
    default: '❌'
  fail-on-threshold:
    description: >
      Controls which threshold breaches fail the action.
      List input (comma- or newline-separated): overall, changed-files-average, per-changed-file, fail-unchanged.
      fail-unchanged applies when skip-unchanged is true and enforces overall checks for filtered reports.
      Leave empty to disable failing on threshold breaches.
    required: false
    default: 'overall,changed-files-average,per-changed-file'
  debug:
    description: 'Enable detail logging.'
    required: false
    default: 'false'

outputs:
  coverage-overall:
    description: 'Overall coverage percentage.'
    value: ${{ steps.jacoco-report-to-pr-comment.outputs.coverage-overall }}
  coverage-changed-files:
    description: 'Coverage percentage for changed files.'
    value: ${{ steps.jacoco-report-to-pr-comment.outputs.coverage-changed-files }}
  coverage-overall-passed:
    description: 'Overall coverage pass status. (True/False)'
    value: ${{ steps.jacoco-report-to-pr-comment.outputs.coverage-overall-passed }}
  coverage-changed-files-passed:
    description: 'Coverage for changed files pass status. (True/False)'
    value: ${{ steps.jacoco-report-to-pr-comment.outputs.coverage-changed-files-passed }}
  reports-coverage:
    description: 'Coverage for each report.'
    value: ${{ steps.jacoco-report-to-pr-comment.outputs.reports-coverage }}
  groups-coverage:
    description: 'Coverage for each report group.'
    value: ${{ steps.jacoco-report-to-pr-comment.outputs.groups-coverage }}

branding:
  icon: 'book-open'
  color: 'yellow'

runs:
  using: 'composite'
  steps:
    - name: Install Python dependencies
      run: |
        python_version=$(python --version 2>&1 | grep -oP '\d+\.\d+\.\d+')
        minimal_required_version="3.14.0"
        
        function version { echo "$@" | awk -F. '{ printf("%d%03d%03d\n", $1,$2,$3); }'; }
        
        echo "Current Python version: $python_version"
        echo "Minimal required Python version: $minimal_required_version"
        
        if [ $(version $python_version) -lt $(version $minimal_required_version) ]; then
          echo "Python version is less than $minimal_required_version"
          exit 1
        else
          echo "Python version meets the minimum requirement of $minimal_required_version"
        fi
        
        python -m venv .venv
        source .venv/bin/activate
        pip install -r ${{ github.action_path }}/requirements.txt
      shell: bash

    - name: Set PROJECT_ROOT and update PYTHONPATH
      run: |
        ACTION_ROOT="${{ github.action_path }}"
        export PYTHONPATH="${PYTHONPATH}:${ACTION_ROOT}/jacoco-report-to-pr-comment"
      shell: bash

    - name: Prepare environment based on mining regimes
      run: |
        write_multiline_env() {
          local key="$1"
          local value="$2"
          local delimiter="EOF_${key}_$(date +%s%N)_$RANDOM"
          {
            echo "${key}<<${delimiter}"
            printf '%s\n' "$value"
            echo "$delimiter"
          } >> "$GITHUB_ENV"
        }

        write_multiline_env "INPUT_TOKEN" "${{ inputs.token }}"

        write_multiline_env "INPUT_PATHS" "${{ inputs.paths }}"
        write_multiline_env "INPUT_EXCLUDE_PATHS" "${{ inputs.exclude-paths }}"

        write_multiline_env "INPUT_GLOBAL_THRESHOLDS" "${{ inputs.global-thresholds }}"
        write_multiline_env "INPUT_REPORT_THRESHOLDS_DEFAULT" "${{ inputs.report-thresholds-default }}"
        write_multiline_env "INPUT_TITLE" "${{ inputs.title }}"
        write_multiline_env "INPUT_PR_NUMBER" "${{ inputs.pr-number }}"
        write_multiline_env "INPUT_METRIC" "${{ inputs.metric }}"
        write_multiline_env "INPUT_COMMENT_LEVEL" "${{ inputs.comment-level }}"

        write_multiline_env "INPUT_REPORT_GROUPS" "${{ inputs.report-groups }}"

        write_multiline_env "INPUT_SKIP_UNCHANGED" "${{ inputs.skip-unchanged }}"
        write_multiline_env "INPUT_EVALUATE_UNCHANGED" "${{ inputs.evaluate-unchanged }}"
        write_multiline_env "INPUT_GLOBAL_OVERALL_SCOPE" "${{ inputs.global-overall-scope }}"

        write_multiline_env "INPUT_BASELINE_PATHS" "${{ inputs.baseline-paths }}"

        write_multiline_env "INPUT_UPDATE_COMMENT" "${{ inputs.update-comment }}"
        write_multiline_env "INPUT_PASS_SYMBOL" "${{ inputs.pass-symbol }}"
        write_multiline_env "INPUT_FAIL_SYMBOL" "${{ inputs.fail-symbol }}"
        write_multiline_env "INPUT_FAIL_ON_THRESHOLD" "${{ inputs.fail-on-threshold }}"
        write_multiline_env "INPUT_DEBUG" "${{ inputs.debug }}"
      shell: bash

    - name: Run JaCoCo Report to PR Comment
      id: jacoco-report-to-pr-comment
      env:
        INPUT_TOKEN: ${{ env.INPUT_TOKEN }}
        INPUT_PATHS: ${{ env.INPUT_PATHS }}
        INPUT_EXCLUDE_PATHS: ${{ env.INPUT_EXCLUDE_PATHS }}
        INPUT_GLOBAL_THRESHOLDS: ${{ env.INPUT_GLOBAL_THRESHOLDS }}
        INPUT_REPORT_THRESHOLDS_DEFAULT: ${{ env.INPUT_REPORT_THRESHOLDS_DEFAULT }}
        INPUT_TITLE: ${{ env.INPUT_TITLE }}
        INPUT_PR_NUMBER: ${{ env.INPUT_PR_NUMBER }}
        INPUT_METRIC: ${{ env.INPUT_METRIC }}
        INPUT_COMMENT_LEVEL: ${{ env.INPUT_COMMENT_LEVEL }}
        INPUT_REPORT_GROUPS: ${{ env.INPUT_REPORT_GROUPS }}
        INPUT_SKIP_UNCHANGED: ${{ env.INPUT_SKIP_UNCHANGED }}
        INPUT_EVALUATE_UNCHANGED: ${{ env.INPUT_EVALUATE_UNCHANGED }}
        INPUT_GLOBAL_OVERALL_SCOPE: ${{ env.INPUT_GLOBAL_OVERALL_SCOPE }}
        INPUT_BASELINE_PATHS: ${{ env.INPUT_BASELINE_PATHS }}
        INPUT_UPDATE_COMMENT: ${{ env.INPUT_UPDATE_COMMENT }}
        INPUT_PASS_SYMBOL: ${{ env.INPUT_PASS_SYMBOL }}
        INPUT_FAIL_SYMBOL: ${{ env.INPUT_FAIL_SYMBOL }}
        INPUT_FAIL_ON_THRESHOLD: ${{ env.INPUT_FAIL_ON_THRESHOLD }}
        INPUT_DEBUG: ${{ env.INPUT_DEBUG }}
      run: |
        source .venv/bin/activate
        python ${{ github.action_path }}/main.py
      shell: bash
